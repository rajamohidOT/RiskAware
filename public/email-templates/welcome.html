<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Welcome to RiskAware</title>
  <style>
    body { font-family: Arial, sans-serif; background: #f9f9f9; color: #222; }
    .container { background: #fff; padding: 32px; border-radius: 8px; max-width: 500px; margin: 40px auto; box-shadow: 0 2px 8px rgba(0,0,0,0.07); }
    h1 { color: #1a73e8; }
    p { font-size: 1.1em; }
    .cta { display: inline-block; margin-top: 24px; padding: 12px 24px; background: #1a73e8; color: #fff; border-radius: 4px; text-decoration: none; font-weight: bold; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Welcome, {{firstName}}!</h1>
    <p>Your account has been created on <b>RiskAware</b>. Please log in to get started and explore your dashboard.</p>
    <a href="https://riskaware.app/login" class="cta">Log In</a>
    <p style="margin-top:32px; color:#888; font-size:0.95em;">If you did not expect this email, you can ignore it.</p>
  </div>
</body>
</html>
